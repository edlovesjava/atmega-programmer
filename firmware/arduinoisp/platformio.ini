; ArduinoISP -> the Nano, uploaded over USB by `make isp`.
; Standalone project so the vendored .ino compiles at its own src/ root
; (PlatformIO will not build a .ino under a shared/multi-firmware src_dir).
[env:programmer]
platform = atmelavr
framework = arduino
board = nanoatmega328
upload_protocol = arduino
; This Lafvin/CH340 clone Nano ships the NEW bootloader (115200 baud). The
; nanoatmega328 board defaults to the OLD 57600 speed, which fails with
; "stk500_getsync(): not in sync: resp=0x1c". Pin 115200 to match the bootloader.
; (If you ever use an OLD-bootloader Nano, drop this to 57600.)
upload_speed = 115200
; upload port is passed by the Makefile: pio run -d firmware/arduinoisp -e programmer -t upload --upload-port $(PORT)
